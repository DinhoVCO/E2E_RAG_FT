# RAG end-to-end experiment matrix: embedding (base|lora) x generation (base|lora).
#
# Run one experiment:
#   python scripts/generation/run_rag_experiment.py --experiment telco-dpr-emb-base-gen-base-top5
#
# Run all experiments for one dataset:
#   python scripts/generation/run_rag_experiment.py --dataset telco-dpr
#
# List available experiments:
#   python scripts/generation/run_rag_experiment.py --list

defaults:
  embedding_model: Qwen/Qwen3-Embedding-4B
  generation_model: Qwen/Qwen3-8B
  top_k: 5
  retrieval_top_k: 10
  split: test
  retrieval_batch_size: 128
  generation_batch_size: 8
  base_retrieval_run_label: vllm-offline-b128
  lora_retrieval_run_label_template: "vllm-lora-{dataset}-b128"

datasets:
  telco-dpr:
    embedding_lora: DinoStackAI/Qwen3-Emb-4b-lora-telco-dpr
    generation_lora: DinoStackAI/Qwen3-8b-lora-telco-dpr

  qasper:
    paper_scoped: true
    embedding_lora: DinoStackAI/Qwen3-Emb-4b-lora-qasper
    generation_lora: DinoStackAI/Qwen3-8b-lora-qasper

  narrativeqa:
    embedding_lora: DinoStackAI/Qwen3-Emb-4b-lora-narrativeqa
    generation_lora: DinoStackAI/Qwen3-8b-lora-narrativeqa

  bioasq-resplit:
    embedding_lora: DinoStackAI/Qwen3-Emb-4b-lora-bioasq-resplit
    generation_lora: DinoStackAI/Qwen3-8b-lora-bioasq-resplit

experiments:
  # --- telco-dpr ---
  telco-dpr-emb-base-gen-base-top5:
    dataset: telco-dpr
    embedding: base
    generation: base
    run_label: telco-dpr-emb-base-gen-base-top5

  telco-dpr-emb-lora-gen-base-top5:
    dataset: telco-dpr
    embedding: lora
    generation: base
    run_label: telco-dpr-emb-lora-gen-base-top5

  telco-dpr-emb-base-gen-lora-top5:
    dataset: telco-dpr
    embedding: base
    generation: lora
    run_label: telco-dpr-emb-base-gen-lora-top5

  telco-dpr-emb-lora-gen-lora-top5:
    dataset: telco-dpr
    embedding: lora
    generation: lora
    run_label: telco-dpr-emb-lora-gen-lora-top5

  # --- qasper ---
  qasper-emb-base-gen-base-top5:
    dataset: qasper
    embedding: base
    generation: base
    run_label: qasper-emb-base-gen-base-top5

  qasper-emb-lora-gen-base-top5:
    dataset: qasper
    embedding: lora
    generation: base
    run_label: qasper-emb-lora-gen-base-top5

  qasper-emb-base-gen-lora-top5:
    dataset: qasper
    embedding: base
    generation: lora
    run_label: qasper-emb-base-gen-lora-top5

  qasper-emb-lora-gen-lora-top5:
    dataset: qasper
    embedding: lora
    generation: lora
    run_label: qasper-emb-lora-gen-lora-top5

  # --- narrativeqa ---
  narrativeqa-emb-base-gen-base-top5:
    dataset: narrativeqa
    embedding: base
    generation: base
    run_label: narrativeqa-emb-base-gen-base-top5

  narrativeqa-emb-lora-gen-base-top5:
    dataset: narrativeqa
    embedding: lora
    generation: base
    run_label: narrativeqa-emb-lora-gen-base-top5

  narrativeqa-emb-base-gen-lora-top5:
    dataset: narrativeqa
    embedding: base
    generation: lora
    run_label: narrativeqa-emb-base-gen-lora-top5

  narrativeqa-emb-lora-gen-lora-top5:
    dataset: narrativeqa
    embedding: lora
    generation: lora
    run_label: narrativeqa-emb-lora-gen-lora-top5

  # --- bioasq-resplit ---
  bioasq-resplit-emb-base-gen-base-top5:
    dataset: bioasq-resplit
    embedding: base
    generation: base
    run_label: bioasq-resplit-emb-base-gen-base-top5

  bioasq-resplit-emb-lora-gen-base-top5:
    dataset: bioasq-resplit
    embedding: lora
    generation: base
    run_label: bioasq-resplit-emb-lora-gen-base-top5

  bioasq-resplit-emb-base-gen-lora-top5:
    dataset: bioasq-resplit
    embedding: base
    generation: lora
    run_label: bioasq-resplit-emb-base-gen-lora-top5

  bioasq-resplit-emb-lora-gen-lora-top5:
    dataset: bioasq-resplit
    embedding: lora
    generation: lora
    run_label: bioasq-resplit-emb-lora-gen-lora-top5
